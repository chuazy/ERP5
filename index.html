<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP5</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #121936;
        --text: #e8ecff;
        --muted: #9aa6d1;
        --accent: #7c9cff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #17224d 0%, var(--bg) 55%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(720px, calc(100vw - 32px));
        padding: 40px;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        background: rgba(18, 25, 54, 0.88);
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3.5rem);
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }
      .tag {
        display: inline-block;
        margin-bottom: 16px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(124, 156, 255, 0.15);
        color: var(--accent);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="tag">GitHub Pages</div>
      <h1>ERP5</h1>
      <p>A fresh clean GitHub Pages site for your enterprise harness project. Ready for the real architecture page.</p>
    </main>
  </body>
</html>
